<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2A7B8E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Login - entlast.de</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(145deg, #e8f0f2 0%, #f5f7fa 40%, #ffffff 100%);
            -webkit-font-smoothing: antialiased;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        /* Icon */
        .login-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #2A7B8E, #3BA5A8);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(42, 123, 142, 0.25);
        }
        .login-icon svg {
            width: 38px;
            height: 38px;
            fill: none;
            stroke: white;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Branding */
        .login-brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-brand h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a2e35;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .login-brand p {
            font-size: 0.95rem;
            color: #6b8a94;
            font-weight: 400;
        }

        /* Card */
        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04), 0 12px 40px rgba(0,0,0,0.06);
            padding: 36px 28px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #3d5a63;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 1rem;
            border: 2px solid #e2e8ec;
            border-radius: 10px;
            background: #f8fafb;
            color: #1a2e35;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
            -webkit-appearance: none;
        }
        .form-group input::placeholder {
            color: #a3b8c0;
        }
        .form-group input:focus {
            border-color: #2A7B8E;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(42, 123, 142, 0.12);
        }

        /* Button */
        .login-btn {
            width: 100%;
            padding: 15px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #2A7B8E, #34919E);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
            box-shadow: 0 4px 12px rgba(42, 123, 142, 0.3);
            margin-top: 4px;
            -webkit-tap-highlight-color: transparent;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(42, 123, 142, 0.35);
        }
        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(42, 123, 142, 0.25);
        }
        .login-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        /* Error */
        .login-error {
            display: none;
            background: #fef2f2;
            color: #b91c1c;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 20px;
            border: 1px solid #fecaca;
            line-height: 1.4;
        }
        .login-error.active {
            display: block;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: #94a7af;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 28px 22px;
                border-radius: 14px;
            }
            .login-brand h1 {
                font-size: 1.5rem;
            }
        }

        /* Animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-container {
            animation: fadeUp 0.4s ease-out;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-brand">
            <div class="login-icon">
                <svg viewBox="0 0 24 24">
                    <!-- Haus mit Herz -->
                    <path d="M3 10.5L12 3l9 7.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V10.5z"/>
                    <path d="M12 21v-6"/>
                    <path d="M12 11.5c-.8-1.5-2.5-2-3.5-1s-1 2.5.5 4l3 2.5 3-2.5c1.5-1.5 1.5-3 .5-4s-2.7-.5-3.5 1z"/>
                </svg>
            </div>
            <h1>entlast.de</h1>
            <p>Alltagshilfe einfach verwalten</p>
        </div>

        <div class="login-card">
            <div class="login-error" id="loginError"></div>

            <form id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="loginUser">Benutzername</label>
                    <input type="text" id="loginUser"
                           placeholder="Benutzername eingeben" autocomplete="username"
                           autocapitalize="none" required>
                </div>

                <div class="form-group">
                    <label for="loginPass">Passwort</label>
                    <input type="password" id="loginPass"
                           placeholder="Passwort eingeben" autocomplete="current-password" required>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    Anmelden
                </button>
            </form>
        </div>

        <div class="login-footer">
            entlast.de &mdash; Sichere Verwaltung Ihrer Alltagshilfe
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');
        const btnEl = document.getElementById('loginBtn');

        form.addEventListener('submit', async () => {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;

            if (!username || !password) {
                showError('Bitte Benutzername und Passwort eingeben.');
                return;
            }

            btnEl.disabled = true;
            btnEl.textContent = 'Wird angemeldet\u2026';
            errorEl.classList.remove('active');

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!res.ok) {
                    const body = await res.json().catch(() => ({}));
                    throw new Error(body.detail || 'Login fehlgeschlagen');
                }

                window.location.href = '/index.html';
            } catch (e) {
                showError(e.message || 'Anmeldung fehlgeschlagen. Bitte erneut versuchen.');
                btnEl.disabled = false;
                btnEl.textContent = 'Anmelden';
            }
        });

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.add('active');
        }

        // Falls bereits eingeloggt, direkt weiterleiten
        (async () => {
            try {
                const res = await fetch('/auth/me', { credentials: 'include' });
                if (res.ok) window.location.href = '/index.html';
            } catch (e) {}
        })();
    </script>

</body>
</html>
