<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#E91E7B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Login - entlast.de</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/patches.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 16px;
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--gray-100) 100%);
        }

        .login-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 40px 28px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 16px;
            object-fit: cover;
            box-shadow: var(--shadow-md);
        }

        .login-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 4px;
        }

        .login-subtitle {
            font-size: 0.9rem;
            color: var(--gray-500);
            margin-bottom: 28px;
        }

        .login-error {
            display: none;
            background: var(--danger-bg);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            margin-bottom: 16px;
            text-align: left;
        }

        .login-error.active {
            display: block;
        }

        .login-footer {
            margin-top: 24px;
            font-size: 0.78rem;
            color: var(--gray-400);
        }

        .login-footer a {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="assets/logo.png" alt="Logo" class="login-logo" id="loginLogo">
        <h1 class="login-title" id="loginTitle">entlast.de</h1>
        <p class="login-subtitle">Bitte anmelden</p>

        <div class="login-error" id="loginError"></div>

        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label for="loginUser">Benutzername</label>
                <input type="text" id="loginUser" class="form-control"
                       placeholder="Benutzername" autocomplete="username"
                       autocapitalize="none" required>
            </div>

            <div class="form-group">
                <label for="loginPass">Passwort</label>
                <input type="password" id="loginPass" class="form-control"
                       placeholder="Passwort" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
                Anmelden
            </button>
        </form>

        <div class="login-footer">
            <a href="https://entlast.de">entlast.de</a> &mdash; Alltagshilfe-Verwaltung
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');
        const btnEl = document.getElementById('loginBtn');

        form.addEventListener('submit', async () => {
            const username = document.getElementById('loginUser').value.trim();
            const password = document.getElementById('loginPass').value;

            if (!username || !password) {
                showError('Bitte Benutzername und Passwort eingeben.');
                return;
            }

            btnEl.disabled = true;
            btnEl.textContent = 'Wird angemeldet...';
            errorEl.classList.remove('active');

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!res.ok) {
                    const body = await res.json().catch(() => ({}));
                    throw new Error(body.detail || 'Login fehlgeschlagen');
                }

                // Erfolg -> zur App weiterleiten
                window.location.href = '/index.html';
            } catch (e) {
                showError(e.message || 'Anmeldung fehlgeschlagen. Bitte erneut versuchen.');
                btnEl.disabled = false;
                btnEl.textContent = 'Anmelden';
            }
        });

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.classList.add('active');
        }

        // Falls bereits eingeloggt, direkt weiterleiten
        (async () => {
            try {
                const res = await fetch('/auth/me', { credentials: 'include' });
                if (res.ok) {
                    window.location.href = '/index.html';
                }
            } catch (e) {
                // Nicht eingeloggt, Login-Seite zeigen
            }
        })();
    </script>

</body>
</html>
